services:
  db:
    image: pgvector/pgvector:pg17-trixie
    container_name: rag_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=rag_db
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - psql_data:/var/lib/postgresql/data
  
  minio:
    image: minio/minio:latest
    container_name: minio_rag
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=secretpassword
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag
    ports:
      - "11435:11434" 
    environment:
      - LLM_MODEL=llama3.2:1b 
    volumes:
      - ./ollama_models:/root/.ollama
    # Lệnh này giúp tự động pull model khi container khởi chạy
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull $$LLM_MODEL && wait" ]
  
  redis:
    image: redis:alpine
    container_name: redis_rag
    ports:
      - "6379:6379"
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi_app

  fastapi_app:
    build: . 
    container_name: fastapi_app
    env_file:
      - .env
    ports:
    - "8000:8000" 
    depends_on:
      - db
      - redis
      - minio
      - ollama
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  

volumes:
  psql_data:
  minio_data:
