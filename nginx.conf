events {
    worker_connections 1024;
}

http {
    upstream backend {
        server fastapi_app:8000; # fastapi_app là tên service trong docker-compose
    }

    server {
        listen 80 default_server;
        server_name _;

        # Chuyển hướng các request API vào Backend
        location /api/v1/ {
            proxy_pass http://backend/api/v1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cấu hình đặc biệt để hỗ trợ Streaming (chữ chạy từ từ của Ollama)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "keep-alive";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s; # Tránh bị timeout khi LLM sinh câu trả lời dài
        }

        # Mở luôn Swagger UI qua Nginx
        location /docs {
            proxy_pass http://backend/docs;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
        }
    }
}